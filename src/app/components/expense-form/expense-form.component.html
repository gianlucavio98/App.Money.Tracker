<div class="container py-4" style="max-width: 600px;">
  <h2 class="mb-4">
    <i class="bi {{ isEdit ? 'bi-pencil' : 'bi-plus-circle' }} me-2"></i>
    {{ (isEdit ? 'expenseForm.titleEdit' : 'expenseForm.titleAdd') | translate }}
  </h2>

  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="amount" class="form-label">{{ 'expenseForm.amountLabel' | translate }}</label>
          <input type="number" class="form-control" id="amount" [(ngModel)]="amount"
            name="amount" step="0.01" min="0.01" required placeholder="0.00" />
        </div>

        <div class="mb-3">
          <label for="category" class="form-label">{{ 'common.category' | translate }}</label>
          <select class="form-select" id="category" [(ngModel)]="categoryId" name="categoryId" required>
            <option [ngValue]="0" disabled>{{ 'expenseForm.selectCategory' | translate }}</option>
            @for (cat of categories(); track cat.id) {
              <option [ngValue]="cat.id">{{ i18n.categoryName(cat) }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label for="date" class="form-label">{{ 'common.date' | translate }}</label>
          <input type="date" class="form-control" id="date" [(ngModel)]="date" name="date" required />
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">{{ 'common.description' | translate }}</label>
          <textarea class="form-control" id="description" [(ngModel)]="description"
            name="description" rows="3" [placeholder]="'expenseForm.descriptionPlaceholder' | translate"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="saving() || !amount || !categoryId || !date">
            @if (saving()) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            {{ (isEdit ? 'expenseForm.updateButton' : 'expenseForm.addButton') | translate }}
          </button>
          <button type="button" class="btn btn-outline-secondary" routerLink="/expenses">{{ 'common.cancel' | translate }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
